<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 460" role="img" aria-labelledby="title description">
  <title id="title">Losshound network diagnostics</title>
  <desc id="description">A precise technical masthead showing a verified path from the local machine through the gateway and DNS to a public target.</desc>

  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#18313a"/>
    </pattern>
    <style>
      .sans { font-family: Inter, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "Cascadia Mono", Consolas, "Courier New", monospace; }
      .cyan { fill: #48d6ff; }
      .muted { fill: #77919b; }
      .white { fill: #edf7fa; }
      .green { fill: #71e58a; }
      .hairline { stroke: #24434e; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1600" height="460" fill="#05090c"/>
  <rect width="1600" height="460" fill="url(#grid)" opacity="0.55"/>
  <path d="M0 1H1600M0 459H1600" stroke="#2ba9cc" stroke-width="2"/>
  <path d="M32 32H180M32 32V112M1568 32H1420M1568 32V112M32 428H180M32 428V348M1568 428H1420M1568 428V348" fill="none" stroke="#28515f" stroke-width="2"/>

  <g transform="translate(70 56)">
    <rect width="54" height="54" fill="#0a1419" stroke="#48d6ff" stroke-width="2"/>
    <path d="M11 37H22V25H32V15H43" fill="none" stroke="#48d6ff" stroke-width="3"/>
    <circle cx="11" cy="37" r="3.5" fill="#71e58a"/>
    <circle cx="22" cy="25" r="3.5" fill="#48d6ff"/>
    <circle cx="32" cy="15" r="3.5" fill="#48d6ff"/>
    <circle cx="43" cy="15" r="3.5" fill="#edf7fa"/>
  </g>

  <text x="142" y="76" class="mono cyan" font-size="14" font-weight="700" letter-spacing="2.4">WINDOWS NETWORK DIAGNOSTICS</text>
  <text x="142" y="100" class="mono muted" font-size="12" letter-spacing="1.6">LOCAL-FIRST / VERIFIED STATE / v0.1.3</text>

  <text x="68" y="202" class="sans white" font-size="76" font-weight="800" letter-spacing="7">LOSSHOUND</text>
  <text x="72" y="244" class="sans muted" font-size="21" font-weight="500" letter-spacing="0.5">Find the fault domain. Verify the fix.</text>
  <line x1="70" y1="276" x2="850" y2="276" class="hairline"/>

  <g class="mono" font-size="13" font-weight="700" letter-spacing="1.4">
    <rect x="70" y="304" width="102" height="36" fill="#091318" stroke="#24434e"/>
    <text x="92" y="327" class="cyan">01 / LAN</text>
    <rect x="184" y="304" width="142" height="36" fill="#091318" stroke="#24434e"/>
    <text x="204" y="327" class="cyan">02 / GATEWAY</text>
    <rect x="338" y="304" width="102" height="36" fill="#091318" stroke="#24434e"/>
    <text x="360" y="327" class="cyan">03 / DNS</text>
    <rect x="452" y="304" width="106" height="36" fill="#091318" stroke="#24434e"/>
    <text x="474" y="327" class="cyan">04 / WAN</text>
    <rect x="570" y="304" width="122" height="36" fill="#091318" stroke="#24434e"/>
    <text x="592" y="327" class="cyan">05 / ROUTE</text>
  </g>

  <text x="70" y="398" class="mono muted" font-size="12" letter-spacing="1.4">MONITOR  /  DIAGNOSE  /  BENCHMARK  /  RESTORE</text>
  <text x="70" y="423" class="mono white" font-size="12" letter-spacing="1.2">NO TELEMETRY BY DEFAULT</text>
  <circle cx="292" cy="419" r="4" fill="#71e58a"/>

  <g transform="translate(926 52)">
    <rect width="604" height="356" fill="#071015" stroke="#28515f" stroke-width="1.5"/>
    <path d="M0 42H604" class="hairline"/>
    <text x="22" y="27" class="mono cyan" font-size="12" font-weight="700" letter-spacing="1.7">LIVE PATH / VERIFIED STATE</text>
    <circle cx="550" cy="21" r="5" fill="#71e58a"/>
    <text x="565" y="26" class="mono green" font-size="11" font-weight="700">HEALTHY</text>

    <path d="M63 150H189H335H521" fill="none" stroke="#24434e" stroke-width="8"/>
    <path d="M63 150H189H335H521" fill="none" stroke="#48d6ff" stroke-width="2"/>
    <circle cx="63" cy="150" r="10" fill="#071015" stroke="#71e58a" stroke-width="3"/>
    <circle cx="189" cy="150" r="10" fill="#071015" stroke="#48d6ff" stroke-width="3"/>
    <circle cx="335" cy="150" r="10" fill="#071015" stroke="#48d6ff" stroke-width="3"/>
    <circle cx="521" cy="150" r="10" fill="#071015" stroke="#edf7fa" stroke-width="3"/>

    <g class="mono" text-anchor="middle">
      <text x="63" y="112" class="white" font-size="12" font-weight="700">LOCAL</text>
      <text x="63" y="184" class="muted" font-size="11">192.0.2.20</text>
      <text x="189" y="112" class="white" font-size="12" font-weight="700">GATEWAY</text>
      <text x="189" y="184" class="muted" font-size="11">192.0.2.1</text>
      <text x="335" y="112" class="white" font-size="12" font-weight="700">DNS</text>
      <text x="335" y="184" class="muted" font-size="11">93.184.216.34</text>
      <text x="521" y="112" class="white" font-size="12" font-weight="700">PUBLIC</text>
      <text x="521" y="184" class="muted" font-size="11">1.1.1.1</text>
    </g>

    <g transform="translate(22 230)">
      <rect width="174" height="86" fill="#091318" stroke="#24434e"/>
      <text x="16" y="24" class="mono muted" font-size="10" letter-spacing="1.5">ROUND TRIP</text>
      <text x="16" y="58" class="mono white" font-size="25" font-weight="700">13.60</text>
      <text x="114" y="58" class="mono cyan" font-size="11">MS</text>

      <rect x="188" width="174" height="86" fill="#091318" stroke="#24434e"/>
      <text x="204" y="24" class="mono muted" font-size="10" letter-spacing="1.5">PACKET LOSS</text>
      <text x="204" y="58" class="mono green" font-size="25" font-weight="700">0.00</text>
      <text x="286" y="58" class="mono green" font-size="11">%</text>

      <rect x="376" width="184" height="86" fill="#091318" stroke="#24434e"/>
      <text x="392" y="24" class="mono muted" font-size="10" letter-spacing="1.5">JITTER</text>
      <text x="392" y="58" class="mono white" font-size="25" font-weight="700">0.18</text>
      <text x="466" y="58" class="mono cyan" font-size="11">MS</text>
    </g>
  </g>
</svg>
